<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Trader Application — £15/month | Clip Services</title>
<meta name="description" content="List your market stall on Clip Services UK. Simple form, £15/month flat, Stripe checkout for customers, WhatsApp order alerts.">
<meta name="theme-color" content="#8B3A3A">
<link rel="canonical" href="https://clipservice.app/market-stall">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--t:#8B3A3A;--c:#F5F0E8;--b:#2C1810}
body{font-family:Inter,system-ui,sans-serif;background:var(--c);color:var(--b);line-height:1.6;margin:0;padding:24px 20px 48px;max-width:560px;margin-inline:auto}
h1{font-family:"Playfair Display",Georgia,serif;color:var(--t);font-size:1.65rem}
label{display:block;font-weight:600;margin-top:14px;font-size:14px}
input,textarea,select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #ccc;margin-top:4px;font-size:16px}
button{margin-top:20px;background:var(--t);color:#fff;border:none;padding:14px 22px;border-radius:12px;font-weight:700;cursor:pointer;width:100%;font-size:16px}
.msg{margin-top:16px;padding:12px;border-radius:10px;display:none}
.msg.ok{background:#e8f5e9;color:#1b5e20}
.msg.err{background:#ffebee;color:#b71c1c}
a{color:var(--t);font-weight:600}
</style>
</head>
<body>
<p><a href="/">← Home</a> · <a href="/store-owner">Full store application</a></p>
<h1>Market stall — £15/month</h1>
<p>For individual traders who want a simple presence: one page, WhatsApp alerts, Stripe payments through Clip Services. Tell us about your stall below — we’ll confirm by email and WhatsApp.</p>

<form id="f">
  <label for="name">Your name</label>
  <input id="name" name="name" required autocomplete="name">

  <label for="email">Email</label>
  <input id="email" name="email" type="email" required autocomplete="email">

  <label for="phone">WhatsApp number</label>
  <input id="phone" name="phone" type="tel" required autocomplete="tel">

  <label for="city">City / market</label>
  <input id="city" name="city" required placeholder="e.g. Manchester Arndale market">

  <label for="desc">What do you sell?</label>
  <textarea id="desc" name="desc" rows="4" required placeholder="e.g. Caribbean veg, spices, drinks…"></textarea>

  <label><input type="checkbox" id="consent" required> I agree to the <a href="/terms">terms</a> and privacy policy.</label>

  <button type="submit">Submit application</button>
</form>
<p id="msg" class="msg" role="status"></p>

<script>
(function(){
  const el = document.getElementById("msg");
  document.getElementById("f").addEventListener("submit", async function(ev){
    ev.preventDefault();
    el.style.display = "none";
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const city = document.getElementById("city").value.trim();
    const desc = document.getElementById("desc").value.trim();
    const message = "[STORE APPLICATION]\nType: Market stall (£15/mo)\nCity: "+city+"\nSell: "+desc;
    try {
      const r = await fetch("/api/contact", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, email, phone, message, applicationType: "stall" }) });
      const j = await r.json();
      if (j.ok) {
        el.className = "msg ok";
        el.textContent = "Thanks — we’ve received your stall application. We’ll email you shortly.";
        el.style.display = "block";
        const wa = "447487588706";
        window.open("https://wa.me/"+wa+"?text="+encodeURIComponent("Hi Clip Services — I submitted a market stall application ("+name+")."), "_blank");
      } else {
        el.className = "msg err";
        el.textContent = j.error || "Something went wrong.";
        el.style.display = "block";
      }
    } catch (e) {
      el.className = "msg err";
      el.textContent = "Network error — try again.";
      el.style.display = "block";
    }
  });
})();
</script>
</body>
</html>
